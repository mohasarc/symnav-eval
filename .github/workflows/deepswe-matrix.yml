name: deepswe-matrix

on:
  workflow_dispatch:
    inputs:
      agents:
        description: "comma-sep agents (blank=all: claude,codex)"
        default: "claude,codex"
      conditions:
        description: "comma-sep conditions (blank=all)"
        default: "symnav,stock"

jobs:
  claude:
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        condition: [symnav, stock]
        task:
          - arktype-json-schema-refs-dependencies
          - csstree-shorthand-expansion-compression
          - awilix-async-container-initialization
          - clack-async-autocomplete-options
          - dynamodb-toolbox-conditional-attribute-requirements
          - claude-code-by-agents-recursive-delegation
          - cliffy-config-file-parsing
          - dynamodb-toolbox-lazy-recursive-schemas
          - drizzle-orm-window-function-builders
          - effect-sse-httpapi-streaming
          - eicrud-keyset-pagination-cursor
          - happy-dom-deterministic-intersectionobserver
          - httpx-deterministic-cookie-store
          - happy-dom-abort-pending-body-reads
          - ink-grid-box-layout
          - kea-atomic-signal-selectors
          - koota-deferred-mutation-buffer
          - katex-multicolumn-array-spans
          - koota-composite-trait-aspects
          - koota-query-predicates
          - kysely-window-grouping-helpers
          - meriyah-explicit-resource-declarations
          - koota-pair-relation-tracking
          - obsidian-linter-auto-table-of-contents
          - obsidian-linter-link-format-conversion
          - ofetch-per-origin-circuit-breaker
          - obsidian-linter-scoped-ignore-markers
          - optique-conditional-option-dependencies
          - prometheus-transactional-reload-status
          - query-persist-restored-query-state
          - sql-formatter-bigquery-pipe-formatting
          - quill-shared-toolbar-focus
          - superjson-error-stack-serialization
          - ts-pattern-match-each
          - testem-bail-on-test-failure
          - testem-per-launcher-reports
          - yjs-map-conflict-detection
          - valibot-recursive-schema-composition
          - true-myth-iterable-collection-combinators
          - vitest-duration-sharding
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Gate
        id: gate
        run: |
          reqC="${{ github.event.inputs.conditions }}"; reqA="${{ github.event.inputs.agents }}"
          ok=true
          if [ -n "$reqC" ] && ! echo ",$reqC," | grep -q ",${{ matrix.condition }},"; then ok=false; fi
          if [ -n "$reqA" ] && ! echo ",$reqA," | grep -q ",claude,"; then ok=false; fi
          echo "run=$ok" >> "$GITHUB_OUTPUT"
      - name: Free runner disk
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"
      - name: Install Pier
        if: steps.gate.outputs.run == 'true'
        run: python -m pip install -q --upgrade pip && python -m pip install -q datacurve-pier
      - name: Clone DeepSWE tasks
        if: steps.gate.outputs.run == 'true'
        run: git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git
      - name: Build job config
        if: steps.gate.outputs.run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
        run: |
          set -euo pipefail
          C="${{ matrix.condition }}"; T="${{ matrix.task }}"
          if [ "$C" = symnav ]; then LINE="import_path: symnav_agent:SymnavClaudeCode"; else LINE="name: claude-code"; fi
            cat > job.yaml <<YAML
          agents:
            - $LINE
              model_name: anthropic/claude-opus-4-8
              env:
                CLAUDE_CODE_OAUTH_TOKEN: \${CLAUDE_CODE_OAUTH_TOKEN}
              kwargs:
                effort: high
          datasets:
            - path: deep-swe/tasks
              task_names: ["$T"]
          YAML
            printf 'CLAUDE_CODE_OAUTH_TOKEN=%s\n' "$CLAUDE_CODE_OAUTH_TOKEN" > .env
            echo "ENV_ARGS=--env-file .env" >> "$GITHUB_ENV"
          echo "----- job.yaml -----"; cat job.yaml
      - name: Run Pier (wait-and-retry on rate/usage limit)
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          LIMIT_RE='session limit|usage limit|hit your (usage|session) limit|"api_error_status":[[:space:]]*429|try again at'
          done=0
          for attempt in $(seq 1 12); do
            rm -rf jobs
            pier run --config job.yaml $ENV_ARGS --env docker || true
            if grep -rqiE "$LIMIT_RE" jobs 2>/dev/null; then
              echo "::warning::rate/usage limit on attempt $attempt — sleeping 25m then retrying"
              sleep 1500
              continue
            fi
            echo "completed on attempt $attempt"; done=1; break
          done
          [ "$done" = 1 ] || echo "::warning::still limited after retries"
      - name: Upload cell
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cell-claude-${{ matrix.condition }}-${{ matrix.task }}
          path: jobs
          if-no-files-found: ignore
          retention-days: 21

  codex:
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        condition: [symnav, stock]
        task:
          - arktype-json-schema-refs-dependencies
          - csstree-shorthand-expansion-compression
          - awilix-async-container-initialization
          - clack-async-autocomplete-options
          - dynamodb-toolbox-conditional-attribute-requirements
          - claude-code-by-agents-recursive-delegation
          - cliffy-config-file-parsing
          - dynamodb-toolbox-lazy-recursive-schemas
          - drizzle-orm-window-function-builders
          - effect-sse-httpapi-streaming
          - eicrud-keyset-pagination-cursor
          - happy-dom-deterministic-intersectionobserver
          - httpx-deterministic-cookie-store
          - happy-dom-abort-pending-body-reads
          - ink-grid-box-layout
          - kea-atomic-signal-selectors
          - koota-deferred-mutation-buffer
          - katex-multicolumn-array-spans
          - koota-composite-trait-aspects
          - koota-query-predicates
          - kysely-window-grouping-helpers
          - meriyah-explicit-resource-declarations
          - koota-pair-relation-tracking
          - obsidian-linter-auto-table-of-contents
          - obsidian-linter-link-format-conversion
          - ofetch-per-origin-circuit-breaker
          - obsidian-linter-scoped-ignore-markers
          - optique-conditional-option-dependencies
          - prometheus-transactional-reload-status
          - query-persist-restored-query-state
          - sql-formatter-bigquery-pipe-formatting
          - quill-shared-toolbar-focus
          - superjson-error-stack-serialization
          - ts-pattern-match-each
          - testem-bail-on-test-failure
          - testem-per-launcher-reports
          - yjs-map-conflict-detection
          - valibot-recursive-schema-composition
          - true-myth-iterable-collection-combinators
          - vitest-duration-sharding
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Gate
        id: gate
        run: |
          reqC="${{ github.event.inputs.conditions }}"; reqA="${{ github.event.inputs.agents }}"
          ok=true
          if [ -n "$reqC" ] && ! echo ",$reqC," | grep -q ",${{ matrix.condition }},"; then ok=false; fi
          if [ -n "$reqA" ] && ! echo ",$reqA," | grep -q ",codex,"; then ok=false; fi
          echo "run=$ok" >> "$GITHUB_OUTPUT"
      - name: Free runner disk
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"
      - name: Install Pier
        if: steps.gate.outputs.run == 'true'
        run: python -m pip install -q --upgrade pip && python -m pip install -q datacurve-pier
      - name: Clone DeepSWE tasks
        if: steps.gate.outputs.run == 'true'
        run: git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git
      - name: Build job config
        if: steps.gate.outputs.run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
        run: |
          set -euo pipefail
          C="${{ matrix.condition }}"; T="${{ matrix.task }}"
          if [ "$C" = symnav ]; then LINE="import_path: symnav_agent:SymnavCodex"; else LINE="import_path: symnav_agent:CodexStock"; fi
            cat > job.yaml <<YAML
          agents:
            - $LINE
              model_name: openai/gpt-5.4
              env:
                CODEX_FORCE_AUTH_JSON: "1"
              kwargs:
                reasoning_effort: xhigh
          datasets:
            - path: deep-swe/tasks
              task_names: ["$T"]
          YAML
            mkdir -p ~/.codex; printf '%s' "$CODEX_AUTH_JSON_B64" | base64 -d > ~/.codex/auth.json
            echo "ENV_ARGS=" >> "$GITHUB_ENV"
          echo "----- job.yaml -----"; cat job.yaml
      - name: Run Pier (wait-and-retry on rate/usage limit)
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          LIMIT_RE='session limit|usage limit|hit your (usage|session) limit|"api_error_status":[[:space:]]*429|try again at'
          done=0
          for attempt in $(seq 1 12); do
            rm -rf jobs
            pier run --config job.yaml $ENV_ARGS --env docker || true
            if grep -rqiE "$LIMIT_RE" jobs 2>/dev/null; then
              echo "::warning::rate/usage limit on attempt $attempt — sleeping 25m then retrying"
              sleep 1500
              continue
            fi
            echo "completed on attempt $attempt"; done=1; break
          done
          [ "$done" = 1 ] || echo "::warning::still limited after retries"
      - name: Upload cell
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cell-codex-${{ matrix.condition }}-${{ matrix.task }}
          path: jobs
          if-no-files-found: ignore
          retention-days: 21
